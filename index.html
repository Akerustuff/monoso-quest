<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Cacos Quest</title>

<!-- PWA META TAGS -->
<meta name="application-name" content="Cacos Quest">
<meta name="description" content="Gestor de tareas gamificado para Mono y Oso">
<meta name="theme-color" content="#080b10">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cacos Quest">

<!-- PWA ICONS (inline SVG as data URL) -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='100' fill='%23080b10'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-size='300' fill='%23c9943a'%3E%F0%9F%8F%AF%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='100' fill='%23080b10'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-size='300'%3E%F0%9F%8F%AF%3C/text%3E%3C/svg%3E">

<!-- PWA MANIFEST (inline) -->
<link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22Cacos%20Quest%22%2C%22short_name%22%3A%22Cacos%20Quest%22%2C%22description%22%3A%22Gestor%20de%20tareas%20gamificado%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23080b10%22%2C%22theme_color%22%3A%22%23080b10%22%2C%22orientation%22%3A%22portrait%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%253Csvg%2520xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%2520viewBox%3D'0%25200%2520512%2520512'%253E%253Crect%2520width%3D'512'%2520height%3D'512'%2520rx%3D'100'%2520fill%3D'%2523080b10'%2F%253E%253Ctext%2520x%3D'50%2525'%2520y%3D'54%2525'%2520dominant-baseline%3D'middle'%2520text-anchor%3D'middle'%2520font-size%3D'300'%253E%25F0%259F%258F%25AF%253C%2Ftext%253E%253C%2Fsvg%253E%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%2C%22purpose%22%3A%22any%20maskable%22%7D%5D%7D">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
/* PWA safe areas for iPhone notch/home bar */
html{background:#080b10}
:root{--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px)}
:root{--bg:#080b10;--surface:#0d1219;--surface2:#111820;--border:#1e2d3d;--border2:#243444;--gold:#c9943a;--gold-l:#e8b96a;--gold-g:rgba(201,148,58,0.22);--text:#d4c9b8;--text2:#8a9aaa;--text3:#4a5a6a;--mono:#7eb8e8;--oso:#e8a87e;--weekly:#b89ee8;--ft:'Cinzel',serif;--fu:'Rajdhani',sans-serif;--fb:'Crimson Pro',serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(201,148,58,.05) 0%,transparent 60%),radial-gradient(ellipse 40% 60% at 0% 60%,rgba(46,184,160,.04) 0%,transparent 50%);pointer-events:none;z-index:0}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.app{position:relative;z-index:1;max-width:520px;margin:0 auto;padding:calc(12px + var(--safe-top)) 14px calc(60px + var(--safe-bot))}

/* SYNC STATUS */
.sync-bar{display:flex;align-items:center;justify-content:center;gap:6px;padding:5px 0 2px;font-family:var(--fu);font-size:.6rem;letter-spacing:2px;color:var(--text3);text-transform:uppercase;transition:all .3s}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);transition:all .3s;flex-shrink:0}
.sync-bar.online .sync-dot{background:#3dd68c;box-shadow:0 0 6px rgba(61,214,140,.5)}
.sync-bar.online{color:#3dd68c}
.sync-bar.syncing .sync-dot{background:var(--gold);animation:blink .8s infinite}
.sync-bar.syncing{color:var(--gold)}
.sync-bar.error .sync-dot{background:#e05c3a}
.sync-bar.error{color:#e05c3a}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* PLAYER SELECT */
.ps-screen{position:fixed;inset:0;background:var(--bg);z-index:900;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:24px;padding:24px}
.ps-title{font-family:var(--ft);font-size:1.4rem;color:var(--gold-l);letter-spacing:3px;text-align:center;text-shadow:0 0 24px rgba(232,185,106,.4)}
.ps-sub{font-family:var(--fu);font-size:.7rem;color:var(--text3);letter-spacing:3px;text-transform:uppercase;text-align:center}
.ps-btns{display:flex;gap:16px}
.ps-btn{width:140px;height:140px;border-radius:20px;border:2px solid var(--border2);background:var(--surface);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;transition:all .25s;-webkit-tap-highlight-color:transparent;user-select:none}
.ps-btn:active{transform:scale(.94)}
.ps-ico{font-size:3rem;pointer-events:none}
.ps-name{font-family:var(--ft);font-size:.9rem;letter-spacing:2px;pointer-events:none}
.ps-btn.mono-btn{border-color:rgba(126,184,232,.3);color:var(--mono)}
.ps-btn.oso-btn{border-color:rgba(232,168,126,.3);color:var(--oso)}

/* HEADER */
.header{text-align:center;padding:18px 0 12px}
.hdr-icon{font-size:1.8rem}
.hdr-title{font-family:var(--ft);font-size:1.4rem;font-weight:900;color:var(--gold-l);letter-spacing:3px;text-shadow:0 0 28px rgba(232,185,106,.4)}
.hdr-players{display:flex;justify-content:center;gap:14px;margin-top:8px}
.pbadge{font-family:var(--fu);font-size:.68rem;font-weight:600;letter-spacing:3px;text-transform:uppercase;padding:3px 12px;border-radius:20px;border:1px solid;cursor:pointer;transition:all .2s;user-select:none}
.pbadge.mono{color:var(--mono);border-color:rgba(126,184,232,.3);background:rgba(126,184,232,.06)}
.pbadge.oso{color:var(--oso);border-color:rgba(232,168,126,.3);background:rgba(232,168,126,.06)}
.pbadge.active-player.mono{border-color:var(--mono);border-width:2px;box-shadow:0 0 8px rgba(126,184,232,.3)}
.pbadge.active-player.oso{border-color:var(--oso);border-width:2px;box-shadow:0 0 8px rgba(232,168,126,.3)}

/* SCORE */
.score-panel{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:16px;margin:8px 0;position:relative;overflow:hidden}
.score-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.score-grid{display:flex;align-items:center}
.score-block{flex:1;text-align:center}
.s-label{font-family:var(--fu);font-size:.58rem;letter-spacing:3px;color:var(--text3);text-transform:uppercase;display:block;margin-bottom:3px}
.s-num{font-family:var(--ft);font-size:1.6rem;color:var(--gold-l);line-height:1;text-shadow:0 0 16px var(--gold-g)}
.s-num.mono{color:var(--mono);text-shadow:0 0 16px rgba(126,184,232,.3)}
.s-num.oso{color:var(--oso);text-shadow:0 0 16px rgba(232,168,126,.3)}
.s-div{width:1px;height:44px;background:var(--border2);flex-shrink:0}
.cycle-wrap{margin-top:12px}
.cycle-meta{display:flex;justify-content:space-between;font-family:var(--fu);font-size:.62rem;color:var(--text3);margin-bottom:5px;letter-spacing:1px}
.cycle-meta strong{color:var(--gold)}
.bar-track{background:rgba(255,255,255,.04);border-radius:4px;height:5px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--gold),var(--gold-l));transition:width .8s ease}

/* BATTLE PASS */
.battle-pass{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:14px;margin:8px 0}
.panel-hdr{font-family:var(--fu);font-size:.62rem;letter-spacing:4px;color:var(--text3);text-transform:uppercase;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.panel-badge{background:rgba(201,148,58,.1);color:var(--gold);padding:2px 10px;border-radius:20px;font-size:.58rem;letter-spacing:2px;border:1px solid rgba(201,148,58,.2)}
.bp-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:10px}
.bp-node{aspect-ratio:1;border-radius:10px;border:1.5px solid var(--border);background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px}
.bp-node.unlocked{border-color:var(--gold);background:rgba(201,148,58,.06);box-shadow:0 0 8px rgba(201,148,58,.15)}
.bp-node.nextup{border-color:var(--gold);background:rgba(201,148,58,.1);animation:npulse 2.5s ease-in-out infinite}
@keyframes npulse{0%,100%{box-shadow:0 0 8px rgba(201,148,58,.2)}50%{box-shadow:0 0 18px rgba(201,148,58,.5)}}
.bp-lv{font-family:var(--fu);font-size:.52rem;color:var(--text3);letter-spacing:1px}
.bp-ico{font-size:1.05rem;line-height:1}
.bp-rew{font-size:.44rem;color:var(--text3);text-align:center;padding:0 2px;line-height:1.2}
.bp-node.unlocked .bp-lv,.bp-node.nextup .bp-lv{color:var(--gold)}
.bp-prog{display:flex;justify-content:space-between;font-family:var(--fu);font-size:.6rem;color:var(--text3);margin-top:5px}

/* TABS */
.tabs{display:flex;gap:4px;margin:14px 0 10px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:4px}
.tab-btn{flex:1;padding:8px 4px;border-radius:8px;border:none;background:transparent;color:var(--text3);font-family:var(--fu);font-size:.68rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.tab-btn.active{background:rgba(201,148,58,.1);color:var(--gold)}

/* SECTION HDR */
.sec-hdr{font-family:var(--fu);font-size:.58rem;letter-spacing:4px;text-transform:uppercase;color:var(--text3);margin:14px 0 7px;display:flex;align-items:center;gap:8px}
.sec-hdr::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent)}

/* TASK */
.task-list{display:flex;flex-direction:column;gap:5px}
.task-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:9px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden;user-select:none;-webkit-tap-highlight-color:transparent}
.task-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2.5px;background:var(--ic,var(--border))}
.task-item:active{transform:scale(.97)}
.task-item.done{opacity:.42}
.task-item.done .task-name{text-decoration:line-through}
.task-chk{width:22px;height:22px;flex-shrink:0;border-radius:6px;border:1.5px solid var(--ic,var(--border));display:flex;align-items:center;justify-content:center;font-size:.72rem;background:transparent;transition:all .18s}
.task-item.done .task-chk{background:var(--ic,var(--text3));border-color:var(--ic)}
.task-body{flex:1;min-width:0}
.task-name{font-family:var(--fu);font-weight:600;font-size:.84rem;color:var(--text);line-height:1.3}
.task-desc{font-size:.68rem;color:var(--text3);font-style:italic;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-pts{font-family:var(--ft);font-size:.84rem;color:var(--gold);flex-shrink:0;white-space:nowrap}
.ptag{font-family:var(--fu);font-size:.54rem;font-weight:700;letter-spacing:2px;padding:1px 6px;border-radius:10px;text-transform:uppercase;flex-shrink:0}
.ptag.mono{color:var(--mono);background:rgba(126,184,232,.12)}
.ptag.oso{color:var(--oso);background:rgba(232,168,126,.12)}

/* WEEKLY */
.mission-group{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:6px}
.mission-major{padding:11px 12px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:background .18s;position:relative;user-select:none}
.mission-major::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2.5px;background:var(--weekly)}
.maj-icon{font-size:.95rem;flex-shrink:0;pointer-events:none}
.maj-body{flex:1;min-width:0;pointer-events:none}
.maj-name{font-family:var(--fu);font-weight:700;font-size:.84rem;color:var(--text)}
.maj-desc{font-size:.66rem;color:var(--text3);font-style:italic}
.maj-prog{font-family:var(--fu);font-size:.66rem;color:var(--text3);flex-shrink:0;white-space:nowrap;pointer-events:none}
.maj-prog.complete{color:var(--gold)}
.chevron{font-size:.68rem;color:var(--text3);transition:transform .22s;flex-shrink:0;pointer-events:none}
.mission-group.open .chevron{transform:rotate(90deg)}
.minor-list{display:none;flex-direction:column;border-top:1px solid var(--border);background:rgba(0,0,0,.18)}
.mission-group.open .minor-list{display:flex}
.minor-item{padding:9px 12px 9px 28px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:all .18s;border-bottom:1px solid rgba(255,255,255,.03);user-select:none}
.minor-item:last-child{border-bottom:none}
.minor-item.done{opacity:.42}
.minor-item.done .minor-name{text-decoration:line-through}
.minor-chk{width:18px;height:18px;flex-shrink:0;border-radius:5px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:.62rem;pointer-events:none}
.minor-item.done .minor-chk{background:var(--weekly);border-color:var(--weekly)}
.minor-body{flex:1;min-width:0;pointer-events:none}
.minor-name{font-family:var(--fu);font-size:.78rem;color:var(--text);font-weight:500}
.minor-desc{font-size:.64rem;color:var(--text3);font-style:italic}
.minor-pts{font-family:var(--ft);font-size:.76rem;color:var(--weekly);flex-shrink:0;pointer-events:none}
.buff-zone{margin:0 12px 10px;padding:7px 10px;border-radius:8px;background:rgba(201,148,58,.08);border:1px solid rgba(201,148,58,.2);align-items:center;gap:8px;cursor:pointer;display:none}
.buff-zone.show{display:flex}
.buff-zone.claimed{opacity:.5;cursor:default}
.buff-txt{font-family:var(--fu);font-size:.66rem;color:var(--gold);line-height:1.4;flex:1;pointer-events:none}
.buff-pts{font-family:var(--ft);font-size:.8rem;color:var(--gold);flex-shrink:0;pointer-events:none}

/* SOLO */
.solo-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden;margin-bottom:5px;user-select:none}
.solo-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2.5px;background:var(--weekly)}
.solo-item.done{opacity:.42}
.solo-item.done .solo-name{text-decoration:line-through}
.solo-chk{width:22px;height:22px;flex-shrink:0;border-radius:6px;border:1.5px solid var(--weekly);display:flex;align-items:center;justify-content:center;font-size:.72rem;pointer-events:none}
.solo-item.done .solo-chk{background:var(--weekly)}
.solo-body{flex:1;min-width:0;pointer-events:none}
.solo-name{font-family:var(--fu);font-weight:600;font-size:.84rem;color:var(--text)}
.solo-desc{font-size:.66rem;color:var(--text3);font-style:italic}
.solo-pts{font-family:var(--ft);font-size:.84rem;color:var(--weekly);flex-shrink:0;pointer-events:none}

/* MONTHLY */
.monthly-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden;margin-bottom:5px;user-select:none}
.monthly-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--gold),#e8c87e)}
.monthly-item.done{opacity:.42}
.monthly-item.done .m-name{text-decoration:line-through}
.m-chk{width:26px;height:26px;flex-shrink:0;border-radius:8px;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:.9rem;pointer-events:none}
.monthly-item.done .m-chk{background:var(--gold)}
.m-body{flex:1;min-width:0;pointer-events:none}
.m-name{font-family:var(--fu);font-weight:700;font-size:.86rem;color:var(--text)}
.m-desc{font-size:.68rem;color:var(--text3);font-style:italic;margin-top:1px}
.m-right{text-align:right;flex-shrink:0;pointer-events:none}
.m-pn{font-family:var(--ft);font-size:.92rem;color:var(--gold);display:block}
.m-ps{font-size:.56rem;color:var(--text3);font-family:var(--fu);letter-spacing:1px}

/* TOAST */
.xp-toast{position:fixed;top:54px;left:50%;transform:translateX(-50%);background:var(--gold);color:#080b10;font-family:var(--ft);font-size:.9rem;padding:6px 20px;border-radius:30px;pointer-events:none;opacity:0;z-index:9999;letter-spacing:2px;white-space:nowrap}
.xp-toast.show{animation:tup 1.6s ease forwards}
@keyframes tup{0%{opacity:0;transform:translateX(-50%) translateY(8px)}20%{opacity:1;transform:translateX(-50%) translateY(-5px)}70%{opacity:1;transform:translateX(-50%) translateY(-9px)}100%{opacity:0;transform:translateX(-50%) translateY(-26px)}}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:800;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.modal-bg.show{opacity:1;pointer-events:all}
.modal-box{background:var(--surface2);border:1px solid var(--gold);border-radius:20px;padding:28px 24px;text-align:center;max-width:280px;width:90%;box-shadow:0 0 50px rgba(201,148,58,.25);transform:scale(.85);transition:transform .3s}
.modal-bg.show .modal-box{transform:scale(1)}
.m-ico{font-size:2.6rem;margin-bottom:8px}
.m-tit{font-family:var(--ft);font-size:.95rem;color:var(--gold-l);margin-bottom:7px;letter-spacing:2px}
.m-bod{font-size:.82rem;color:var(--text2);line-height:1.6;margin-bottom:16px}
.m-btn{background:rgba(201,148,58,.12);border:1px solid var(--gold);color:var(--gold);padding:8px 22px;border-radius:8px;font-family:var(--fu);font-weight:700;font-size:.76rem;letter-spacing:3px;cursor:pointer}

/* ACTIONS */
.actions{display:flex;gap:7px;margin:18px 0 7px}
.btn-act{flex:1;padding:10px 5px;border-radius:10px;border:1px solid var(--border2);background:transparent;color:var(--text3);font-family:var(--fu);font-weight:600;font-size:.66rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.btn-act:hover{border-color:var(--gold);color:var(--gold)}
.btn-act.primary{border-color:rgba(201,148,58,.4);background:rgba(201,148,58,.06);color:var(--gold)}

/* HISTORY */
.hist-panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;margin:6px 0;display:none}
.hist-panel.open{display:block}
.hist-item{padding:8px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start}
.hist-item:last-child{border-bottom:none}
.hist-cyc{font-family:var(--fu);font-size:.78rem;font-weight:600;color:var(--text)}
.hist-date{font-size:.6rem;color:var(--text3);margin-top:2px}
.hist-pts{font-family:var(--ft);font-size:.84rem;color:var(--gold)}
.hist-empty{text-align:center;color:var(--text3);font-size:.76rem;padding:14px;font-style:italic}
.footer{text-align:center;padding:16px 0 4px;font-family:var(--fu);font-size:.56rem;letter-spacing:3px;color:var(--text3)}
</style>
</head>
<body>

<div class="xp-toast" id="xpToast"></div>

<!-- PLAYER SELECT -->
<div class="ps-screen" id="psScreen">
  <div style="font-size:2.4rem">🏯</div>
  <div class="ps-title">Cacos Quest</div>
  <div class="ps-sub">¿Quién eres hoy?</div>
  <div class="ps-btns">
    <div class="ps-btn mono-btn" id="btnMono">
      <span class="ps-ico">🐒</span>
      <span class="ps-name">Mono</span>
    </div>
    <div class="ps-btn oso-btn" id="btnOso">
      <span class="ps-ico">🐻</span>
      <span class="ps-name">Oso</span>
    </div>
  </div>
</div>

<!-- LEVEL UP MODAL -->

  const sw = `
    const C='ql-v1';
    self.addEventListener('install',e=>e.waitUntil(
      caches.open(C).then(c=>c.add(self.location.href))
    ));
    self.addEventListener('fetch',e=>e.respondWith(
      fetch(e.request).catch(()=>caches.match(e.request))
    ));
  `;
  const url = URL.createObjectURL(new Blob([sw],{type:'application/javascript'}));
  navigator.serviceWorker.register(url).catch(()=>{});
}
</script>

function blank() {
  return {totalXP:0,monoXP:0,osoXP:0,cycleStart:Date.now(),

// ── SYNC UI ────────────────────────────────────
function syncStatus(cls, txt) {
  document.getElementById('syncBar').className = 'sync-bar ' + cls;
  document.getElementById('syncTxt').textContent = txt;
}

// ── SAVE ───────────────────────────────────────
function save() {
  syncStatus('syncing', 'Guardando...');
  if (saving) { pendingSave = true; return; }
  saving = true;
  setDoc(ST_DOC, ST)
    .then(() => {
      saving = false;
      syncStatus('online', 'Sincronizado ✓');
      if (pendingSave) { pendingSave = false; save(); }
    })
    .catch(err => {
      saving = false;
      syncStatus('error', 'Error: ' + err.code);
      console.error('Firestore save:', err);
    });
}

// ── REAL-TIME LISTENER ─────────────────────────
onSnapshot(ST_DOC, snap => {
  if (!snap.exists()) { syncStatus('online', 'Sincronizado ✓'); return; }
  ST = Object.assign(blank(), snap.data());
  syncStatus('online', 'Sincronizado ✓');
  if (currentPlayer) renderAll();
}, err => {
  syncStatus('error', 'Sin conexión');
  console.error('Firestore listen:', err);
});

// ── HELPERS ────────────────────────────────────
const todayKey  = () => { const d=new Date(); return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`; };
const weekKey   = () => 'w' + Math.floor((Date.now()-ST.cycleStart)/(7*86400000));
const weekNum   = () => Math.floor((Date.now()-ST.cycleStart)/(7*86400000));
const cycleDay  = () => Math.min(Math.floor((Date.now()-ST.cycleStart)/86400000)+1,30);
const cycleEnd  = () => new Date(ST.cycleStart+30*86400000).toLocaleDateString('es-ES',{day:'numeric',month:'short'});
const curLv     = () => { for(let i=BP.length-1;i>=0;i--) if(ST.totalXP>=BP[i].xp) return BP[i].lv; return 0; };
const wkSuffix  = () => ROMAN[Math.min(weekNum(),4)];
const byId      = (arr,id) => arr.find(x=>x.id===id) || null;
const isDDaily  = (tid,p) => { const k=`${tid}_${p}`,dk=todayKey(); return !!(ST.dailyDone[dk]&&ST.dailyDone[dk][k]); };
const isDHogar  = (tid,p) => { const k=`${tid}_${p}`,dk=todayKey(); return !!(ST.dailyHogarDone[dk]&&ST.dailyHogarDone[dk][k]); };
const isWMinor  = id => { const wk=weekKey(); return !!(ST.weeklyDone[wk]&&ST.weeklyDone[wk][id]); };
const isWSolo   = id => { const wk=weekKey(); return !!(ST.weeklyDone[wk]&&ST.weeklyDone[wk][id]); };
const isMthly   = id => !!ST.monthlyDone[id];
const isBuff    = id => !!ST.buffClaimed[id];
function addXP(n,p){ST.totalXP+=n;if(p==='mono')ST.monoXP+=n;else if(p==='oso')ST.osoXP+=n;}
function subXP(n,p){ST.totalXP=Math.max(0,ST.totalXP-n);if(p==='mono')ST.monoXP=Math.max(0,ST.monoXP-n);else if(p==='oso')ST.osoXP=Math.max(0,ST.osoXP-n);}

// ── TOAST ──────────────────────────────────────
function toast(txt) {
  const el = document.getElementById('xpToast');
  el.textContent = txt;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
}

// ── LEVEL CHECK ────────────────────────────────

  const cur = curLv();
  if (cur > prev && cur > ST.lastSeenLevel) {

    const d = BP[cur-1];

      document.getElementById('mBod').innerHTML = `El reino reconoce vuestra destreza.<br>Rango: <strong style="color:var(--gold-l)">${d.name}</strong>`;
      document.getElementById('lvlModal').classList.add('show');
    }, 500);
  }
}

// ── DAILY ──────────────────────────────────────
function buildDaily() {
  const p = currentPlayer;
  const ic = p==='mono' ? 'var(--mono)' : 'var(--oso)';
  const pn = p==='mono' ? '🐒 Mono' : '🐻 Oso';

  let h = '<div class="sec-hdr">⚔ Misiones Personales</div><div class="task-list">';
  for (const t of DP) {
    const done = isDDaily(t.id, p);
    h += `<div class="task-item${done?' done':''}" style="--ic:${ic}" data-id="${t.id}" data-p="${p}" data-type="personal">
      <div class="task-chk">${done?'✓':''}</div>
      <div class="task-body"><div class="task-name">${t.name}</div><div class="task-desc">${t.desc}</div></div>
      <div class="task-pts">${done?'✓':'+'}${t.pts}</div></div>`;
  }
  h += '</div><div class="sec-hdr" style="margin-top:16px">🏠 Misiones del Hogar</div><div class="task-list">';
  for (const t of DH) {
    const done = isDHogar(t.id, p);
    h += `<div class="task-item${done?' done':''}" style="--ic:${ic}" data-id="${t.id}" data-p="${p}" data-type="hogar">
      <div class="task-chk">${done?'✓':''}</div>
      <div class="task-body"><div class="task-name">${t.name}</div><div class="task-desc">${t.desc}</div></div>
      <div class="task-pts">${done?'✓':'+'}${t.pts}</div></div>`;
  }
  return h + '</div>';
}
function bindDaily() {
  document.querySelectorAll('.task-item[data-type]').forEach(el => {
    el.addEventListener('click', () => {
      const {id:tid, p, type} = el.dataset;
      const dk=todayKey(), k=`${tid}_${p}`, prev=curLv();
      if (type==='personal') {
        const pts = byId(DP,tid).pts;
        if (!ST.dailyDone[dk]) ST.dailyDone[dk]={};
        if (ST.dailyDone[dk][k]) { delete ST.dailyDone[dk][k]; subXP(pts,p); toast(`-${pts} XP`); }
        else { ST.dailyDone[dk][k]=true; addXP(pts,p); toast(`+${pts} XP`); }
      } else {
        const pts = byId(DH,tid).pts;
        if (!ST.dailyHogarDone[dk]) ST.dailyHogarDone[dk]={};
        if (ST.dailyHogarDone[dk][k]) { delete ST.dailyHogarDone[dk][k]; subXP(pts,p); toast(`-${pts} XP`); }
        else { ST.dailyHogarDone[dk][k]=true; addXP(pts,p); toast(`+${pts} XP`); }
      }
      checkLv(prev); save(); renderAll();
    });
  });
}

// ── WEEKLY ─────────────────────────────────────
function buildWeekly() {
  const suf = wkSuffix();
  let h = `<div class="sec-hdr">🏰 Misiones Mayores — Semana ${suf}</div>`;
  for (const grp of WG) {
    const done = grp.minors.filter(m=>isWMinor(m.id)).length;
    const total = grp.minors.length, allDone = done===total;
    const bk=`${grp.id}_buff`, buffCl=isBuff(bk), showBuff=grp.buff&&(allDone||buffCl);
    h += `<div class="mission-group" id="grp_${grp.id}">
      <div class="mission-major" data-grp="${grp.id}">
        <div class="maj-icon">${allDone?'✅':'🗺️'}</div>
        <div class="maj-body"><div class="maj-name">${grp.name} ${suf}</div><div class="maj-desc">${grp.desc}</div></div>
        <div class="maj-prog${allDone?' complete':''}">${done}/${total}</div>
        <div class="chevron">›</div>
      </div>
      <div class="minor-list">`;
    for (const m of grp.minors) {
      const md = isWMinor(m.id);
      h += `<div class="minor-item${md?' done':''}" data-mid="${m.id}" data-grp="${grp.id}">
        <div class="minor-chk">${md?'✓':''}</div>
        <div class="minor-body"><div class="minor-name">${m.name}</div><div class="minor-desc">${m.desc}</div></div>
        <div class="minor-pts">${md?'✓':'+'}${m.pts}</div></div>`;
    }
    if (grp.buff) {
      h += `<div class="buff-zone${showBuff?' show':''}${buffCl?' claimed':''}" id="buff_${grp.id}">
        <span>⚡</span>
        <div class="buff-txt"><strong>Buff: ${grp.buff}</strong><br>${buffCl?'Ya reclamado':'Completa todas las misiones para reclamar'}</div>
        <div class="buff-pts">${buffCl?'✓':'+'+grp.buffPts}</div></div>`;
    }
    h += '</div></div>';
  }
  h += `<div class="sec-hdr" style="margin-top:16px">⚔ Misiones Individuales — Semana ${suf}</div>`;
  for (const t of WS) {
    const done = isWSolo(t.id);
    h += `<div class="solo-item${done?' done':''}" data-sid="${t.id}">
      <div class="solo-chk">${done?'✓':''}</div>
      <div class="solo-body"><div class="solo-name">${t.name}</div><div class="solo-desc">${t.desc}</div></div>
      <div class="solo-pts">${done?'✓':'+'}${t.pts}</div></div>`;
  }
  return h;
}
function bindWeekly() {
  document.querySelectorAll('.mission-major').forEach(el => {
    el.addEventListener('click', () => document.getElementById('grp_'+el.dataset.grp).classList.toggle('open'));
  });
  document.querySelectorAll('.minor-item').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const {mid, grp:grpId} = el.dataset;
      const grp = byId(WG,grpId), m = byId(grp.minors,mid);
      const wk=weekKey(); if(!ST.weeklyDone[wk]) ST.weeklyDone[wk]={};
      const prev=curLv();
      if (ST.weeklyDone[wk][mid]) {
        delete ST.weeklyDone[wk][mid]; subXP(m.pts,currentPlayer); toast(`-${m.pts} XP`);
        const bk=`${grpId}_buff`;
        if (grp.buff && ST.buffClaimed[bk]) { delete ST.buffClaimed[bk]; subXP(grp.buffPts,currentPlayer); }
      } else {
        ST.weeklyDone[wk][mid]=true; addXP(m.pts,currentPlayer); toast(`+${m.pts} XP`);
      }
      checkLv(prev); save(); renderAll();
    });
  });
  document.querySelectorAll('.buff-zone').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      if (el.classList.contains('claimed')) return;
      const grpId = el.id.replace('buff_','');
      const grp = byId(WG,grpId);
      if (!grp?.buff) return;
      if (!grp.minors.every(m=>isWMinor(m.id))) { toast('⚠ Completa todas las misiones menores'); return; }
      const bk=`${grpId}_buff`; if(ST.buffClaimed[bk]) return;
      const prev=curLv();
      ST.buffClaimed[bk]=true; addXP(grp.buffPts,currentPlayer); toast(`⚡ Buff +${grp.buffPts} XP`);
      checkLv(prev); save(); renderAll();
    });
  });
  document.querySelectorAll('.solo-item').forEach(el => {
    el.addEventListener('click', () => {
      const task = byId(WS,el.dataset.sid); if(!task) return;
      const wk=weekKey(); if(!ST.weeklyDone[wk]) ST.weeklyDone[wk]={};
      const prev=curLv();
      if (ST.weeklyDone[wk][task.id]) { delete ST.weeklyDone[wk][task.id]; subXP(task.pts,currentPlayer); toast(`-${task.pts} XP`); }
      else { ST.weeklyDone[wk][task.id]=true; addXP(task.pts,currentPlayer); toast(`+${task.pts} XP`); }
      checkLv(prev); save(); renderAll();
    });
  });
}

// ── MONTHLY ────────────────────────────────────
function buildMonthly() {
  let h = '<div class="sec-hdr">🌕 Misiones del Gran Ciclo</div>';
  h += '<p style="font-family:var(--fb);font-size:.74rem;color:var(--text3);margin-bottom:12px;font-style:italic">Solo una vez por ciclo. ¡Cada misión sube un nivel completo!</p>';
  for (const t of MM) {
    const done = isMthly(t.id);
    h += `<div class="monthly-item${done?' done':''}" data-mid="${t.id}">
      <div class="m-chk">${done?'✓':'🔮'}</div>
      <div class="m-body"><div class="m-name">${t.name}</div><div class="m-desc">${t.desc}</div></div>
      <div class="m-right"><span class="m-pn">${done?'✓':'+'+t.pts}</span><span class="m-ps">${done?'completada':'+1 NIVEL'}</span></div>
    </div>`;
  }
  return h;
}
function bindMonthly() {
  document.querySelectorAll('.monthly-item').forEach(el => {
    el.addEventListener('click', () => {
      const task = byId(MM,el.dataset.mid); if(!task) return;
      const prev=curLv();
      if (ST.monthlyDone[task.id]) { delete ST.monthlyDone[task.id]; subXP(task.pts,currentPlayer); toast(`-${task.pts} XP`); }
      else { ST.monthlyDone[task.id]=true; addXP(task.pts,currentPlayer); toast(`+${task.pts} XP 🌕`); }
      checkLv(prev); save(); renderAll();
    });
  });
}

// ── HISTORY ────────────────────────────────────
function renderHist() {
  const el = document.getElementById('histList');
  if (!ST.history?.length) { el.innerHTML='<div class="hist-empty">Sin ciclos anteriores</div>'; return; }
  el.innerHTML = [...ST.history].reverse().map((e,i) =>
    `<div class="hist-item">
      <div><div class="hist-cyc">Ciclo #${ST.history.length-i} — Nv.${e.level}</div>
      <div class="hist-date">${e.date} · 🐒${e.monoXP} / 🐻${e.osoXP}</div></div>
      <div class="hist-pts">${e.totalXP} XP</div>
    </div>`
  ).join('');
}

// ── NEW CYCLE ──────────────────────────────────
function newCycle() {
  const lv=curLv();
  if (!confirm(`¿Iniciar nuevo ciclo?\n\nSe guardará en historial:\n• Total: ${ST.totalXP} XP\n• Mono: ${ST.monoXP} XP  /  Oso: ${ST.osoXP} XP\n• Nivel: ${lv}\n\nLas misiones se reiniciarán.`)) return;
  const hist = ST.history || [];
  hist.push({totalXP:ST.totalXP,monoXP:ST.monoXP,osoXP:ST.osoXP,level:lv,
    date:new Date().toLocaleDateString('es-ES',{day:'numeric',month:'long',year:'numeric'})});
  ST = blank(); ST.history = hist; ST.cycleStart = Date.now();
  save(); renderAll(); toast('🌙 Nuevo ciclo iniciado');
}

setInterval(() => { if(currentPlayer) document.getElementById('cDay').textContent=cycleDay(); }, 60000);
</script>
